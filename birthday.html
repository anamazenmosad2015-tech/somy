<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Somy 🎉</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.cake{
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.gift-box{
font-size:80px;
cursor:pointer;
transition:transform .3s;
}

.gift-box:hover{
transform:scale(1.1);
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
}

.popup-content{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
max-width:350px;
width:90%;
animation:pop .4s ease;
}

@keyframes pop{
from{transform:scale(.5);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center px-4">

<div class="bg-white shadow-2xl rounded-2xl p-6 sm:p-8 max-w-md w-full text-center">

<h1 class="text-3xl sm:text-4xl font-extrabold text-pink-500 mb-4">
🎂 Happy Birthday Somy 🎂
</h1>

<img
src="esraa.jpg"
alt="Somy"
class="w-40 h-40 object-cover rounded-full mx-auto shadow-lg mb-5 border-4 border-pink-300"
/>

<p class="text-base sm:text-lg text-gray-700 mb-6">
Dear Somy 💖
</p>

<div class="text-6xl cake mb-6">
🎂🎈
</div>

<div id="gift" class="gift-box" onclick="openGift()">
🎁
</div>

<p class="text-gray-500 mt-2">Tap the gift 🎁</p>

</div>


<!-- popup page -->

<div id="popup" class="popup">

<div class="popup-content">

<h2 class="text-2xl font-bold text-pink-500 mb-4">
🎉 Surprise for Somy 🎉
</h2>

<p class="text-gray-700 mb-4">
Happy Birthday Somy 💖  
I wish you happiness, success, and a life full of beautiful moments.
You truly deserve the best!
</p>

<div class="text-5xl mb-4">
🎂🎈🎁💖
</div>

<button onclick="closePopup()" class="px-5 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600">
Close
</button>

</div>

</div>


<script>

function openGift(){

document.getElementById("popup").style.visibility="visible";

confetti({
particleCount:200,
spread:100,
origin:{y:0.6}
});

}

function closePopup(){
document.getElementById("popup").style.visibility="hidden";
}

</script>

</body>
</html>
